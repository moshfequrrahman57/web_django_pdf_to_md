<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

<style>
    .generate-btn {
        background-color: #007bff; /* blue color */
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        text-decoration: none; /* Remove underline from link */
        display: inline-block;
        transition: background-color 0.3s ease;
    }

    .download-btn:hover {
        background-color: #218838; /* Darker green on hover */
    }
    .download-btn:active {
        background-color: #1e7e34;
        transform: translateY(1px);
    }
</style>
</head>
<body>
    <h1>PDF to Markdown Converter</h1>
    <h2>Upload File to Convert to Markdown</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="myfile">
    <button type="submit" class="generate-btn">Generate MD</button>
</form>
{% if error %}
    <div style="color: white; background-color: #ff4d4d; padding: 10px; border-radius: 5px; margin: 15px;">
        <strong>Error:</strong> {{ error }}
    </div>
{% endif %}
</body>
</html>
